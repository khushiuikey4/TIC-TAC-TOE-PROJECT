<!DOCTYPE html>
<html>

<head lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC TAC TOE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="title">
            <div id="mainlogo"></div>
            <div id="mainheading">Tic Tac Toe !</div>
        </div>
    </header>
    <main>
        <div class="boardContainer">
            <div class="board">
                <button class="box" id="0"></button>
                <button class="box" id="1"></button>
                <button class="box" id="2"></button>
                <button class="box" id="3"></button>
                <button class="box" id="4"></button>
                <button class="box" id="5"></button>
                <button class="box" id="6"></button>
                <button class="box" id="7"></button>
                <button class="box" id="8"></button>
            </div>
        </div>
        <div class="winner">
            <div class="winnerText">
            </div>
            <div class="MiniboardContainer">
                <div id="Miniboard">
                    <button class="Minibox" id="0"></button>
                    <button class="Minibox" id="1"></button>
                    <button class="Minibox" id="2"></button>
                    <button class="Minibox" id="3"></button>
                    <button class="Minibox" id="4"></button>
                    <button class="Minibox" id="5"></button>
                    <button class="Minibox" id="6"></button>
                    <button class="Minibox" id="7"></button>
                    <button class="Minibox" id="8"></button>
                </div>
            </div>
            <div class="winnerText">Click Reset button to play again!!</div>
        </div>
    </main>
    <footer>
        <div class="resetButtonContainer">
            <button class="reset">Reset Game</button>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
